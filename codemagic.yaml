workflows:
  ios-workflow:
    name: iOS Workflow (Legrinpo)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.legrinpo.app
      vars:
        # Projet Capacitor : le workspace iOS est toujours dans ios/App/
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build web + sync Capacitor
        script: |
          export CAPACITOR_BUILD=1
          npm run build
          rm -rf cap-web && mkdir -p cap-web && cp -r out/* cap-web/
          npx cap sync ios
      - name: Install CocoaPods
        script: cd ios/App && pod install && cd ../..
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups: []
        submit_to_app_store: false
