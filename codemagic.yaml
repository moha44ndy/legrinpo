workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.legrinpo.app
    scripts:
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcodebuild -workspace "src/legrinpo.xcworkspace" \
            -scheme "legrinpo" \
            -configuration Release \
            -archivePath build/legrinpo.xcarchive \
            archive
    artifacts:
      - build/legrinpo.xcarchive
    publishing:
      app_store_connect:
        auth: integration