workflows:
  ios-workflow:
    name: iOS Workflow (Legrinpo)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.legrinpo.app
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        # URL du site en prod : l’app iOS charge cette URL (pas de build Next en CI)
        PRODUCTION_WEB_URL: "https://legrinpo.com"
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Prepare cap-web + sync Capacitor
        script: |
          rm -rf cap-web && mkdir -p cap-web
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Legrinpo</title></head><body><p>Chargement…</p></body></html>' > cap-web/index.html
          npx cap sync ios
      - name: Install CocoaPods
        script: cd ios/App && pod install && cd ../..
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups: []
        submit_to_app_store: false

  android-workflow:
    name: Android Workflow (Legrinpo)
    max_build_duration: 120
    environment:
      java: 21
      vars:
        # URL du site en prod : l’app Android charge cette URL (via capacitor.config.ts)
        PRODUCTION_WEB_URL: "https://www.legrinpo.com"
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Prepare cap-web + sync Capacitor (Android)
        script: |
          rm -rf cap-web && mkdir -p cap-web
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Legrinpo</title></head><body><p>Chargement…</p></body></html>' > cap-web/index.html
          npx cap sync android
      - name: Build Android App Bundle
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
